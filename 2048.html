<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  body{
    margin:0;background:#0f172a;color:#fff;font-family:Arial;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;text-align:center
  }
  h1{color:#facc15;margin-bottom:5px}
  #score{font-size:20px;margin-bottom:15px}
 .grid{
    display:grid;grid-template-columns:repeat(4,70px);grid-template-rows:repeat(4,70px);
    gap:8px;background:#1e293b;padding:10px;border-radius:14px
  }
 .tile{
    width:70px;height:70px;background:#334155;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:bold;transition:0.15s
  }
 .t2{background:#eee4da;color:#776e65}.t4{background:#ede0c8;color:#776e65}
 .t8{background:#f2b179;color:#fff}.t16{background:#f59563;color:#fff}
 .t32{background:#f67c5f;color:#fff}.t64{background:#f65e3b;color:#fff}
 .t128{background:#edcf72;color:#fff;font-size:20px}
 .t256{background:#edcc61;color:#fff;font-size:20px}
 .t512{background:#edc850;color:#fff;font-size:20px}
 .t1024{background:#edc53f;color:#fff;font-size:18px}
 .t2048{background:#edc22e;color:#fff;font-size:18px}
  p{color:#94a3b8;margin-top:12px;font-size:14px}
</style>
</head>
<body>
  <h1>2048</h1>
  <div id="score">Score: 0</div>
  <div class="grid" id="grid"></div>
  <p>Use Arrow Keys or Swipe</p>

<script>
let board=[[],[]],score=0;

function init(){
  board=[[],[]];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)board[r][c]=0;
  addTile();addTile();draw();score=0;
  document.getElementById('score').textContent='Score: 0';
}

function addTile(){
  let empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(board[r][c]===0)empty.push([r,c]);
  if(empty.length){
    let [r,c]=empty[Math.floor(Math.random()*empty.length)];
    board[r][c]=Math.random()<0.9?2:4;
  }
}

function draw(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    let v=board[r][c];
    let t=document.createElement('div');
    t.className='tile'+(v?' t'+v:'');
    t.textContent=v||'';
    g.appendChild(t);
  }
}

function slide(arr){
  let a=arr.filter(x=>x),s=0;
  for(let i=0;i<a.length-1;i++){
    if(a[i]===a[i+1]){a[i]*=2;s+=a[i];a[i+1]=0;}
  }
  a=a.filter(x=>x);
  while(a.length<4)a.push(0);
  score+=s;
  return [a,s];
}

function move(dir){
  let changed=false;
  if(dir==='left'||dir==='right'){
    for(let r=0;r<4;r++){
      let row=dir==='left'?board[r]:board[r].slice().reverse();
      let [res,sc]=slide(row);
      if(dir==='right')res=res.reverse();
      if(res.join()!=board[r].join())changed=true;
      board[r]=res;
    }
  }
  if(dir==='up'||dir==='down'){
    for(let c=0;c<4;c++){
      let col=board.map(r=>r[c]);
      if(dir==='down')col=col.reverse();
      let [res,sc]=slide(col);
      if(dir==='down')res=res.reverse();
      for(let r=0;r<4;r++){
        if(board[r][c]!==res[r])changed=true;
        board[r][c]=res[r];
      }
    }
  }
  if(changed){addTile();draw();document.getElementById('score').textContent='Score: '+score;}
  if(isOver())setTimeout(()=>alert('Game Over! Score: '+score),100);
}

function isOver(){
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(board[r][c]===0)return false;
    if(c<3&&board[r][c]===board[r][c+1])return false;
    if(r<3&&board[r][c]===board[r+1][c])return false;
  }
  return true;
}

document.addEventListener('keydown',e=>{
  if(['ArrowLeft','a','A'].includes(e.key))move('left');
  if(['ArrowRight','d','D'].includes(e.key))move('right');
  if(['ArrowUp','w','W'].includes(e.key))move('up');
  if(['ArrowDown','s','S'].includes(e.key))move('down');
});

init();
</script>
</body>
</html>
